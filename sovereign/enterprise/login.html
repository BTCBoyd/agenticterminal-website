<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Login — Agentic Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { 
  --bg-base: #0a0a08; 
  --bg-surface: #141614; 
  --bg-elevated: #1a1d1a; 
  --bg-border: rgba(255,255,255,0.08); 
  --text-primary: #e8ede9; 
  --text-secondary: #a8b8aa; 
  --text-tertiary: #6e8571; 
  --accent: #f5a623; 
  --accent-dim: rgba(245,166,35,0.15); 
  --teal: #22c55e; 
  --teal-dim: rgba(34,197,94,0.15); 
  --red: #f87171; 
  --blue: #3B82F6;
  --blue-dim: rgba(59,130,246,0.15);
  --mono: 'DM Mono',monospace; 
  --display: 'Syne',sans-serif; 
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg-base); 
  color: var(--text-primary); 
  font-family: var(--display); 
  min-height: 100vh; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  padding: 24px; 
}
body::before { 
  content: ''; 
  position: fixed; 
  inset: 0; 
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); 
  pointer-events: none; 
  z-index: 0; 
}
.login-container { 
  width: 100%; 
  max-width: 480px; 
  position: relative; 
  z-index: 1; 
}
.brand { 
  text-align: center; 
  margin-bottom: 40px; 
}
.brand-logo { 
  width: 64px; 
  height: 64px; 
  margin: 0 auto 20px; 
  background: var(--accent-dim); 
  border: 1px solid var(--accent); 
  border-radius: 16px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 28px; 
}
.brand-title { 
  font-size: 32px; 
  font-weight: 700; 
  letter-spacing: -0.5px; 
  margin-bottom: 8px; 
}
.brand-subtitle { 
  font-family: var(--mono); 
  font-size: 13px; 
  color: var(--text-secondary); 
}

.tab-switcher {
  display: flex;
  background: var(--bg-elevated);
  border: 1px solid var(--bg-border);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 24px;
}
.tab-btn {
  flex: 1;
  padding: 12px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--display);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
}
.tab-btn.active {
  background: var(--accent);
  color: var(--bg-base);
}
.tab-btn:hover:not(.active) {
  color: var(--text-primary);
}

.login-card { 
  background: var(--bg-surface); 
  border: 1px solid var(--bg-border); 
  border-radius: 16px; 
  padding: 32px; 
}
.login-header { 
  text-align: center;
  margin-bottom: 28px; 
}
.login-header h1 { 
  font-size: 20px; 
  font-weight: 600; 
  margin-bottom: 6px; 
}
.login-header p { 
  font-family: var(--mono); 
  font-size: 13px; 
  color: var(--text-secondary); 
  line-height: 1.5; 
}

.wallet-option { 
  display: flex; 
  align-items: center; 
  gap: 14px; 
  padding: 16px; 
  background: var(--bg-elevated); 
  border: 1px solid var(--bg-border); 
  border-radius: 10px; 
  cursor: pointer; 
  transition: all 0.2s; 
  margin-bottom: 10px; 
  text-decoration: none; 
  color: inherit; 
  width: 100%; 
  text-align: left; 
}
.wallet-option:hover { 
  border-color: var(--accent); 
  background: var(--accent-dim); 
}
.wallet-option-icon { 
  width: 40px; 
  height: 40px; 
  border-radius: 10px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 20px; 
  flex-shrink: 0; 
}
.wallet-option-icon.metamask { background: linear-gradient(135deg, #F6851B, #E2761B); }
.wallet-option-icon.alby { background: linear-gradient(135deg, #FFDE6E, #F8C455); }
.wallet-option-text { flex: 1; }
.wallet-option-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.wallet-option-desc { font-family: var(--mono); font-size: 11px; color: var(--text-secondary); }

.divider { 
  display: flex; 
  align-items: center; 
  margin: 20px 0; 
  font-family: var(--mono); 
  font-size: 11px; 
  color: var(--text-tertiary); 
  text-transform: uppercase; 
}
.divider::before,.divider::after { 
  content: ''; 
  flex: 1; 
  height: 1px; 
  background: var(--bg-border); 
}
.divider span { padding: 0 16px; }

.form-group { margin-bottom: 20px; }
.form-label { 
  display: block; 
  font-family: var(--mono); 
  font-size: 11px; 
  color: var(--text-secondary); 
  text-transform: uppercase; 
  letter-spacing: 0.06em; 
  margin-bottom: 8px; 
}
.form-input { 
  width: 100%; 
  background: var(--bg-base); 
  border: 1px solid var(--bg-border); 
  border-radius: 8px; 
  padding: 12px 16px; 
  color: var(--text-primary); 
  font-family: var(--display); 
  font-size: 14px; 
  transition: border-color 0.2s; 
}
.form-input:focus { 
  outline: none; 
  border-color: var(--accent); 
}
.form-input::placeholder { color: var(--text-tertiary); }

.btn { 
  width: 100%;
  padding: 14px 24px; 
  border-radius: 8px; 
  font-family: var(--mono); 
  font-size: 13px; 
  font-weight: 500; 
  cursor: pointer; 
  transition: all 0.2s; 
  border: none; 
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-primary { 
  background: var(--accent); 
  color: var(--bg-base); 
}
.btn-primary:hover:not(:disabled) { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { 
  background: var(--bg-elevated); 
  color: var(--text-secondary); 
  border: 1px solid var(--bg-border); 
}
.btn-secondary:hover:not(:disabled) { 
  border-color: var(--text-secondary); 
  color: var(--text-primary); 
}

.error-message { 
  background: rgba(248,113,113,0.1); 
  border: 1px solid rgba(248,113,113,0.3); 
  border-radius: 8px; 
  padding: 12px 16px; 
  margin-bottom: 20px; 
  font-family: var(--mono); 
  font-size: 12px; 
  color: var(--red); 
  display: none; 
}
.error-message.visible { display: block; }

.loading-message { 
  background: var(--accent-dim); 
  border: 1px solid var(--accent); 
  border-radius: 8px; 
  padding: 12px 16px; 
  margin-bottom: 20px; 
  font-family: var(--mono); 
  font-size: 12px; 
  color: var(--accent); 
  display: none; 
  align-items: center; 
  gap: 10px;
}
.loading-message.visible { display: flex; }
.spinner { 
  width: 16px; 
  height: 16px; 
  border: 2px solid var(--accent); 
  border-top-color: transparent; 
  border-radius: 50%; 
  animation: spin 1s linear infinite; 
}
@keyframes spin { to { transform: rotate(360deg); } }

.back-link { 
  display: block; 
  text-align: center; 
  margin-top: 24px; 
  font-family: var(--mono); 
  font-size: 12px; 
  color: var(--text-secondary); 
  text-decoration: none; 
}
.back-link:hover { color: var(--text-primary); }

.org-selector {
  background: var(--bg-base);
  border: 1px solid var(--bg-border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 20px;
}
.org-selector-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.org-selector-value {
  font-size: 14px;
  font-weight: 500;
}

.step { display: none; }
.step.active { display: block; }

.link-btn {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--accent);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
}
.link-btn:hover {
  text-decoration: underline;
}

.forgot-password {
  text-align: right;
  margin-top: -12px;
  margin-bottom: 16px;
}

@media (max-width: 480px) { 
  .login-card { padding: 24px; } 
  .brand-title { font-size: 28px; } 
}
</style>
</head>
<body>
<div class="login-container">
  <div class="brand">
    <div class="brand-logo">🏢</div>
    <div class="brand-title">Enterprise</div>
    <div class="brand-subtitle">Organization Agent Management</div>
  </div>
  
  <div class="tab-switcher">
    <button class="tab-btn active" onclick="switchTab('admin')">Org Admin</button>
    <button class="tab-btn" onclick="switchTab('member')">Team Member</button>
  </div>
  
  <div class="login-card">
    <div class="error-message" id="error"></div>
    <div class="loading-message" id="loading"><div class="spinner"></div><span id="loading-text">Connecting...</span></div>
    
    <!-- Admin Login -->
    <div class="step active" id="tab-admin">
      <div class="login-header">
        <h1>Admin Sign In</h1>
        <p>Sign in as an organization administrator</p>
      </div>
      
      <button class="wallet-option" onclick="connectMetamask()">
        <div class="wallet-option-icon metamask">🦊</div>
        <div class="wallet-option-text">
          <div class="wallet-option-title">MetaMask</div>
          <div class="wallet-option-desc">Connect with Ethereum wallet</div>
        </div>
      </button>
      
      <button class="wallet-option" onclick="connectAlby()">
        <div class="wallet-option-icon alby">⚡</div>
        <div class="wallet-option-text">
          <div class="wallet-option-title">Alby</div>
          <div class="wallet-option-desc">Connect with Lightning wallet</div>
        </div>
      </button>
      
      <div class="divider"><span>or</span></div>
      
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="admin-email" placeholder="admin@company.com">
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="admin-password" placeholder="••••••••">
      </div>
      
      <button class="btn btn-primary" onclick="loginAdmin()">Sign In</button>
    </div>
    
    <!-- Team Member Login -->
    <div class="step" id="tab-member">
      <div class="login-header">
        <h1>Team Member Sign In</h1>
        <p>Sign in with your email and password</p>
      </div>
      
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="member-email" placeholder="you@company.com">
      </div>
      
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="member-password" placeholder="••••••••">
      </div>
      
      <div class="forgot-password">
        <button class="link-btn" onclick="showForgotPassword()">Forgot password?</button>
      </div>
      
      <button class="btn btn-primary" onclick="loginMember()">Sign In</button>
      
      <div class="divider"><span>or</span></div>
      
      <p style="text-align: center; font-family: var(--mono); font-size: 12px; color: var(--text-secondary);">
        Don't have an account?<br>
        <button class="link-btn" onclick="showInviteLogin()">Redeem invite</button>
      </p>
    </div>
    
    <!-- Invite Redemption -->
    <div class="step" id="tab-invite">
      <div class="login-header">
        <h1>Redeem Invite</h1>
        <p>Enter your invite code to join the organization</p>
      </div>
      
      <div class="form-group">
        <label class="form-label">Invite Code</label>
        <input type="text" class="form-input" id="invite-code" placeholder="XXXX-XXXX-XXXX">
      </div>
      
      <button class="btn btn-primary" onclick="redeemInvite()">Continue</button>
      <button class="btn btn-secondary" onclick="switchTab('member')" style="margin-top: 12px;">Back</button>
    </div>
  </div>
  
  <a href="/sovereign/" class="back-link">← Back to Agentic Terminal</a>
</div>

<script>
const API_BASE = '/api/v1';

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  
  event.target.classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  hideError();
}

function showInviteLogin() {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-invite').classList.add('active');
}

function showForgotPassword() {
  alert('Password reset link would be sent to your email');
}

function showError(msg) {
  document.getElementById('error').textContent = msg;
  document.getElementById('error').classList.add('visible');
}

function hideError() {
  document.getElementById('error').classList.remove('visible');
}

function showLoading(text) {
  document.getElementById('loading-text').textContent = text;
  document.getElementById('loading').classList.add('visible');
}

function hideLoading() {
  document.getElementById('loading').classList.remove('visible');
}

async function connectMetamask() {
  showLoading('Connecting to MetaMask...');
  
  try {
    if (typeof window.ethereum === 'undefined') {
      throw new Error('MetaMask not installed');
    }
    
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    const address = accounts[0];
    
    // Derive DID and authenticate
    const did = `did:ethr:${address}`;
    
    await authenticateEnterprise(did, 'metamask', address);
    
  } catch (error) {
    showError(error.message || 'Failed to connect');
    hideLoading();
  }
}

async function connectAlby() {
  showLoading('Connecting to Alby...');
  
  try {
    if (typeof window.webln === 'undefined') {
      window.open('https://getalby.com', '_blank');
      throw new Error('Alby not installed');
    }
    
    await window.webln.enable();
    const info = await window.webln.getInfo();
    
    const did = `did:key:z${info.node.pubkey.substring(0, 32)}`;
    
    await authenticateEnterprise(did, 'alby', info.node.pubkey);
    
  } catch (error) {
    showError(error.message || 'Failed to connect');
    hideLoading();
  }
}

async function loginAdmin() {
  const email = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value;
  
  if (!email || !password) {
    showError('Please enter email and password');
    return;
  }
  
  showLoading('Signing in...');
  
  try {
    const response = await fetch(`${API_BASE}/enterprise/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, role: 'admin' })
    });
    
    if (!response.ok) {
      // Simulate success for demo
      simulateEnterpriseLogin('admin', email);
      return;
    }
    
    const data = await response.json();
    storeSession(data);
    redirectToDashboard();
    
  } catch (error) {
    simulateEnterpriseLogin('admin', email);
  }
}

async function loginMember() {
  const email = document.getElementById('member-email').value.trim();
  const password = document.getElementById('member-password').value;
  
  if (!email || !password) {
    showError('Please enter email and password');
    return;
  }
  
  showLoading('Signing in...');
  
  try {
    const response = await fetch(`${API_BASE}/enterprise/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    if (!response.ok) {
      simulateEnterpriseLogin('member', email);
      return;
    }
    
    const data = await response.json();
    storeSession(data);
    redirectToDashboard();
    
  } catch (error) {
    simulateEnterpriseLogin('member', email);
  }
}

async function authenticateEnterprise(did, walletType, address) {
  try {
    const response = await fetch(`${API_BASE}/enterprise/auth/did`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ did, walletType, address })
    });
    
    if (!response.ok) {
      simulateEnterpriseLogin('admin', did);
      return;
    }
    
    const data = await response.json();
    storeSession(data);
    redirectToDashboard();
    
  } catch (error) {
    simulateEnterpriseLogin('admin', did);
  }
}

function simulateEnterpriseLogin(role, emailOrDid) {
  const session = {
    role: role,
    email: typeof emailOrDid === 'string' && emailOrDid.includes('@') ? emailOrDid : null,
    did: typeof emailOrDid === 'string' && emailOrDid.startsWith('did:') ? emailOrDid : null,
    orgName: 'Acme Corporation',
    orgId: 'org_' + Math.random().toString(36).substring(2, 10),
    token: 'sim_token_' + Date.now(),
    permissions: role === 'admin' ? ['view', 'approve', 'admin'] : ['view']
  };
  
  storeSession(session);
  redirectToDashboard();
}

function storeSession(data) {
  localStorage.setItem('enterprise_session', JSON.stringify(data));
}

function redirectToDashboard() {
  window.location.href = 'fleet.html';
}

function redeemInvite() {
  const code = document.getElementById('invite-code').value.trim();
  if (!code) {
    showError('Please enter an invite code');
    return;
  }
  alert(`Invite code ${code} would be validated here`);
}

// Check for existing session
(function checkSession() {
  const session = localStorage.getItem('enterprise_session');
  if (session) {
    // Optionally auto-redirect
    // window.location.href = 'fleet.html';
  }
})();
</script>
</body>
</html>
